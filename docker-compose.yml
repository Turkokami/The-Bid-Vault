services:
  postgres:
    image: postgres:16-alpine
    container_name: bid-vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bidvault-postgres-data:/var/lib/postgresql/data

volumes:
  bidvault-postgres-data:
